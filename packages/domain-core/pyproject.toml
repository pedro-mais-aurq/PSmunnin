[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "domain-core"
version = "0.1.0"
description = "Entidades, eventos e contratos de domínio do LeadHunter AI"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/domain_core"]
