[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agents-toolkit"
version = "0.1.0"
description = "Prompts, parsers e evaluators para os agentes de IA"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agents_toolkit"]
