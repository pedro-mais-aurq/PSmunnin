[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shared-sdk"
version = "0.1.0"
description = "HTTP client e eventos tipados compartilhados"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/shared_sdk"]
