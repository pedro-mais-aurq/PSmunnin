version: '3.8'
# Docker Compose para testes E2E
services:
  test-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: leadhunter_test
    ports:
      - "5433:5432"
  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
